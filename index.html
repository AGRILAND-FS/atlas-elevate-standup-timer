<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Meeting Timer</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%8F%B1%EF%B8%8F%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    min-height: 100vh;
    font-family: 'Orbitron', sans-serif;
    background: #000;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  body { display: flex; align-items: center; justify-content: center; text-align: center; }
  #app { width: 100%; min-height: 100%; display: flex; align-items: center; justify-content: center; flex-direction: column; padding: 2rem; }

  /* Start screen */
  .start-screen h1 {
    font-size: clamp(3rem, 8vw, 7rem);
    font-weight: 900;
    margin-bottom: 2rem;
    letter-spacing: 0.1em;
    text-shadow: 0 0 30px rgba(255,255,255,0.4);
    line-height: 1.05;
  }
  .start-screen p { font-size: 2rem; font-weight: 600; color: #bbb; margin-bottom: 2.5rem; letter-spacing: 0.15em; }
  .names-preview {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(0.95rem, 2vw, 1.6rem);
    color: #888;
    margin-bottom: 3.5rem;
    letter-spacing: 0.15em;
    line-height: 1.5;
  }
  .names-toggle {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.75rem;
    margin-bottom: 3rem;
  }
  .name-toggle {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(0.95rem, 1.8vw, 1.4rem);
    font-weight: 700;
    letter-spacing: 0.15em;
    padding: 0.5rem 1rem;
    border: 2px solid currentColor;
    background: transparent;
    color: var(--name-color, #fff);
    text-shadow: 0 0 12px currentColor;
    border-radius: 4px;
    cursor: pointer;
    min-width: 0;
    text-transform: uppercase;
    transition: color 0.15s, border-color 0.15s, text-shadow 0.15s, background 0.15s, transform 0.1s;
  }
  .name-toggle:hover { background: rgba(255,255,255,0.06); box-shadow: none; }
  .name-toggle:active { transform: scale(0.96); }
  .name-toggle.off {
    color: #777;
    border-color: #444;
    text-shadow: none;
  }
  .name-toggle.off:hover { background: rgba(255,255,255,0.04); color: #999; }

  button {
    font-family: 'Orbitron', sans-serif;
    font-size: 2rem;
    padding: 1.5rem 3rem;
    border: 3px solid #fff;
    background: transparent;
    color: #fff;
    border-radius: 4px;
    cursor: pointer;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    transition: transform 0.1s, background 0.2s, box-shadow 0.2s;
    min-width: 14rem;
  }
  button:hover:not(:disabled) { background: #fff; color: #000; box-shadow: 0 0 30px rgba(255,255,255,0.6); }
  button:active:not(:disabled) { transform: scale(0.97); }
  button:disabled { opacity: 0.3; cursor: not-allowed; }
  button.ghost { visibility: hidden; pointer-events: none; }

  .btn-row { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; }
  .btn-done { border-color: #4ade80; color: #4ade80; }
  .btn-done:hover:not(:disabled) { background: #4ade80; color: #000; box-shadow: 0 0 30px rgba(74,222,128,0.7); }
  .btn-over { border-color: #fbbf24; color: #fbbf24; }
  .btn-over:hover:not(:disabled) { background: #fbbf24; color: #000; box-shadow: 0 0 30px rgba(251,191,36,0.7); }
  .btn-pause { border-color: #60a5fa; color: #60a5fa; }
  .btn-pause:hover:not(:disabled) { background: #60a5fa; color: #000; box-shadow: 0 0 30px rgba(96,165,250,0.7); }
  .btn-back { border-color: #888; color: #888; }
  .btn-back:hover:not(:disabled) { background: #888; color: #000; box-shadow: 0 0 30px rgba(136,136,136,0.5); }

  .paused-banner {
    color: #60a5fa;
    font-size: 2.5rem;
    font-weight: 800;
    letter-spacing: 0.3em;
    text-shadow: 0 0 20px rgba(96,165,250,0.7);
  }

  /* Splash screen */
  .splash-screen { width: 100%; max-width: 900px; }
  .splash-screen h1 {
    font-size: 4rem;
    font-weight: 900;
    margin-bottom: 1.5rem;
    letter-spacing: 0.1em;
    text-shadow: 0 0 30px rgba(255,255,255,0.4);
  }
  .splash-screen .subtitle {
    font-size: 1.75rem;
    font-weight: 600;
    color: #aaa;
    margin-bottom: 3rem;
    letter-spacing: 0.2em;
  }
  .team-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.25rem;
    margin-bottom: 1.25rem;
  }
  .team-btn {
    width: 100%;
    min-width: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    padding: 2rem 1.5rem;
  }
  .team-btn .team-name {
    font-size: clamp(1.1rem, 3.5vw, 2rem);
    font-weight: 900;
    letter-spacing: 0.12em;
    color: var(--team-color, #fff);
    text-shadow: 0 0 20px var(--team-color, #fff);
    transition: color 0.2s, text-shadow 0.2s;
    overflow-wrap: break-word;
    word-break: break-word;
    line-height: 1.1;
  }
  .team-btn .team-members {
    font-family: 'Share Tech Mono', monospace;
    color: #888;
    font-size: clamp(0.7rem, 1.5vw, 0.95rem);
    letter-spacing: 0.15em;
    text-transform: none;
  }
  @media (max-width: 600px) {
    .team-grid { grid-template-columns: 1fr; }
  }
  .team-btn {
    border-color: var(--team-color, #fff);
  }
  .team-btn:hover {
    background: var(--team-color, #fff);
    color: #000;
    box-shadow: 0 0 30px var(--team-color, #fff);
  }
  .team-btn:hover .team-name { color: #000; text-shadow: none; }
  .team-btn:hover .team-members { color: #000; }
  /* .custom-btn tile now sits inside the grid alongside the presets */

  /* Configure (custom) screen */
  .config-screen { width: 100%; max-width: 700px; }
  .config-screen h1 {
    font-size: 5rem;
    font-weight: 900;
    margin-bottom: 1rem;
    letter-spacing: 0.1em;
    text-shadow: 0 0 30px rgba(255,255,255,0.4);
  }
  .config-screen .subtitle {
    font-size: 1.5rem;
    font-weight: 600;
    color: #aaa;
    margin-bottom: 2rem;
    letter-spacing: 0.15em;
  }
  textarea#nameInput {
    width: 100%;
    min-height: 14rem;
    padding: 1.25rem 1.5rem;
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.5rem;
    background: #111;
    color: #fff;
    border: 2px solid #444;
    border-radius: 4px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  textarea#nameInput:focus { border-color: #4ade80; box-shadow: 0 0 20px rgba(74,222,128,0.4); }
  .config-stats {
    margin: 1.5rem 0 2rem;
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.5rem;
    color: #aaa;
    letter-spacing: 0.15em;
    min-height: 2rem;
  }
  .config-stats.error { color: #ef4444; }

  /* Flash screen */
  .flash-screen {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    animation: flash 0.5s ease-in-out infinite alternate;
  }
  @keyframes flash {
    from { opacity: 0.4; transform: scale(0.95); }
    to   { opacity: 1;   transform: scale(1.05); }
  }
  .flash-name {
    font-family: 'Orbitron', sans-serif;
    font-size: min(16rem, calc(120vw / var(--name-chars, 5)));
    font-weight: 900;
    letter-spacing: 0.05em;
    text-shadow: 0 0 80px currentColor, 0 0 30px currentColor;
    line-height: 1;
    text-align: center;
    padding: 0 1rem;
  }

  /* Timer screen */
  .timer-screen { display: flex; flex-direction: column; align-items: center; gap: 2rem; width: 100%; }
  .timer-name {
    font-size: min(7rem, calc(75vw / var(--name-chars, 5)));
    font-weight: 900;
    letter-spacing: 0.1em;
    text-shadow: 0 0 40px currentColor;
    line-height: 1;
    text-align: center;
  }
  .timer-clock {
    font-family: 'Share Tech Mono', monospace;
    font-size: 16rem;
    font-weight: 400;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
    line-height: 1;
    text-shadow: 0 0 40px rgba(255,255,255,0.3);
  }
  .timer-clock.overtime { color: #ef4444; text-shadow: 0 0 50px rgba(239,68,68,0.8); }
  .timer-meta { color: #aaa; font-size: 1.75rem; font-weight: 600; letter-spacing: 0.2em; }

  /* Leaderboard link on splash */
  .leaderboard-link {
    margin-top: 2.5rem;
    font-family: 'Share Tech Mono', monospace;
    font-size: 1rem;
    color: #888;
    letter-spacing: 0.2em;
    cursor: pointer;
    background: none;
    border: none;
    min-width: 0;
    padding: 0.5rem 1rem;
    text-transform: uppercase;
  }
  .leaderboard-link:hover { background: none; color: #fff; box-shadow: none; }

  /* Leaderboard screen */
  .leaderboard-screen { width: 100%; max-width: 900px; }
  .leaderboard-screen h1 {
    font-size: clamp(2.5rem, 6vw, 4rem);
    font-weight: 900;
    letter-spacing: 0.1em;
    margin-bottom: 0.5rem;
    text-shadow: 0 0 30px rgba(255,255,255,0.4);
  }
  .leaderboard-screen .subtitle {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.95rem;
    color: #888;
    letter-spacing: 0.15em;
    margin-bottom: 2rem;
    text-transform: none;
  }
  .leaderboard-list { list-style: none; margin-bottom: 2rem; }
  .leaderboard-row {
    display: grid;
    grid-template-columns: 3rem 1fr auto auto;
    gap: 1.5rem;
    align-items: center;
    padding: 1rem 1.5rem; margin-bottom: 0.75rem;
    border: 2px solid #333; border-radius: 4px;
    font-size: clamp(1.1rem, 2vw, 1.75rem);
    text-align: left;
  }
  .leaderboard-row .rank { font-weight: 900; text-align: center; font-family: 'Share Tech Mono', monospace; }
  .leaderboard-row .name { font-weight: 800; letter-spacing: 0.1em; }
  .leaderboard-row .runs {
    font-family: 'Share Tech Mono', monospace;
    color: #888;
    font-size: 0.85em;
    letter-spacing: 0.1em;
    text-transform: none;
  }
  .leaderboard-row .saved {
    font-family: 'Share Tech Mono', monospace;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.05em;
  }
  .leaderboard-row .saved.under { color: #4ade80; }
  .leaderboard-row .saved.over { color: #ef4444; }
  .leaderboard-row.top1 { border-color: #fbbf24; box-shadow: 0 0 30px rgba(251,191,36,0.4); }
  .leaderboard-row.top2 { border-color: #cbd5e1; }
  .leaderboard-row.top3 { border-color: #fb923c; }
  .empty-leaderboard {
    font-family: 'Share Tech Mono', monospace;
    color: #666;
    font-size: 1.25rem;
    letter-spacing: 0.15em;
    padding: 3rem 0;
  }

  /* Light-theme overrides used while the agenda is on screen */
  body.light {
    background: #fff;
    color: #111;
  }
  body.light .agenda-screen h1 {
    color: #111 !important;
    text-shadow: none !important;
  }
  body.light .agenda-card {
    background: #fff;
    border: 1px solid #e2e2e2;
    border-left: 6px solid var(--card-color);
    box-shadow: 0 2px 6px rgba(0,0,0,0.06);
  }
  body.light .agenda-name {
    color: #111;
    text-shadow: none;
  }
  body.light .agenda-section-label { color: #666; opacity: 1; }
  body.light .agenda-items li { color: #222; }
  body.light .agenda-items li::before { color: var(--card-color); }
  body.light button {
    color: #333;
    border-color: #333;
    background: transparent;
  }
  body.light button:hover:not(:disabled) {
    background: #333;
    color: #fff;
    box-shadow: none;
  }
  body.light button.btn-back { color: #888; border-color: #bbb; }
  body.light button.btn-back:hover:not(:disabled) { background: #666; color: #fff; box-shadow: none; }
  body.light button.btn-done { color: #16a34a; border-color: #16a34a; }
  body.light button.btn-done:hover:not(:disabled) { background: #16a34a; color: #fff; box-shadow: 0 2px 12px rgba(22,163,74,0.35); }

  /* Agenda screen (interstitial before the round starts) */
  .agenda-screen { width: 100%; max-width: 900px; }
  .agenda-screen h1 {
    font-size: clamp(2.5rem, 6vw, 4rem);
    font-weight: 900;
    letter-spacing: 0.1em;
    margin-bottom: 2rem;
    text-shadow: 0 0 30px rgba(255,255,255,0.4);
  }
  .agenda-card {
    text-align: left;
    padding: 1.5rem 2rem;
    margin-bottom: 1.25rem;
    border: 2px solid var(--card-color, #333);
    border-radius: 4px;
    background: rgba(255,255,255,0.02);
  }
  .agenda-name {
    font-size: clamp(1.4rem, 2.5vw, 2rem);
    font-weight: 900;
    color: var(--card-color, #fff);
    text-shadow: 0 0 18px currentColor;
    letter-spacing: 0.15em;
    margin-bottom: 0.5rem;
    line-height: 1.1;
  }
  .agenda-section-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.9rem;
    color: var(--card-color, #888);
    letter-spacing: 0.3em;
    margin: 0.9rem 0 0.35rem;
    text-transform: uppercase;
    opacity: 0.85;
  }
  .agenda-items {
    list-style: none;
    padding-left: 1.5rem;
  }
  .agenda-items li {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(0.95rem, 1.5vw, 1.15rem);
    color: #ddd;
    margin-bottom: 0.35rem;
    letter-spacing: 0.05em;
    text-transform: none;
    position: relative;
    line-height: 1.5;
  }
  .agenda-items li::before {
    content: "▸";
    color: var(--card-color, #666);
    position: absolute;
    left: -1.2rem;
    top: 0;
  }

  /* Summary screen */
  .summary-screen { width: 100%; max-width: 900px; }
  .summary-screen h1 {
    font-size: 4rem;
    font-weight: 900;
    letter-spacing: 0.1em;
    margin-bottom: 2rem;
    text-shadow: 0 0 30px rgba(255,255,255,0.4);
  }
  .summary-list { list-style: none; margin-bottom: 2.5rem; }
  .summary-row {
    display: flex; justify-content: space-between; align-items: center; gap: 1.5rem;
    padding: 1.5rem 2rem; margin-bottom: 1rem;
    border: 2px solid #333; border-radius: 4px;
    font-size: 2.25rem;
  }
  .summary-row .name { font-weight: 800; letter-spacing: 0.1em; text-shadow: 0 0 20px currentColor; flex: 1; text-align: left; }
  .summary-row .name .rocket { margin-right: 0.75rem; filter: drop-shadow(0 0 10px #fbbf24); }
  .summary-row .time {
    font-family: 'Share Tech Mono', monospace;
    font-variant-numeric: tabular-nums;
    color: #aaa;
    letter-spacing: 0.05em;
    text-align: right;
  }
  .summary-row .time.over { color: #ef4444; }
  .summary-row .time.under { color: #4ade80; }
  .summary-row.winner {
    border-color: #fbbf24;
    box-shadow: 0 0 30px rgba(251,191,36,0.4);
  }
  .summary-row.absent {
    opacity: 0.4;
    border-style: dashed;
  }
  .summary-row.absent .name { text-shadow: none; }
  .summary-row.absent .time {
    font-family: 'Orbitron', sans-serif;
    text-transform: uppercase;
    font-size: 0.7em;
    letter-spacing: 0.3em;
    color: #888;
  }
  .total-row { border-color: #fff; margin-top: 2rem; font-weight: 900; }
</style>
</head>
<body>
<div id="app"></div>

<script>
(() => {
  const TEAMS = {
    "ELEVATE":            { color: "#7FDBFF", goFirst: "Brian",            members: ["Brian", "Mary", "Amber", "Lori", "Jeremy", "Reagan", "Jen"], flexLast: { name: "Jen", maxSeconds: 5 * 60 } },
    "PREVIEW & PLANNING": {
      color: "#4ADE80",
      fixedOrder: true,
      perPersonSeconds: 10 * 60,
      members: ["Mary", "Jeremy", "Lori", "Amber", "Brian", "Reagan"],
      agendaTitle: "July 1, 2026 Agenda",
      agenda: {
        "Mary": {
          preview: ["fun w/ LWCs"],
          planning: ["energy opportunities, especially for lubes, DEF, etc."],
        },
        "Jeremy": {
          preview: ["FP backend, route books, FP chrome extension (no XML because no JSON from FP yet)"],
          planning: ["platform structure for reporting engine under the hood (shift away from Amazon Quick)"],
        },
        "Lori": {
          preview: ["contracting stopgap (HTML report vs Laura, etc.), 95 manual refreshes"],
          planning: ["customer report / interpretation (freed up to deep dive on the whys)"],
        },
        "Amber": {
          preview: ["agfs.app login/admin, FP data flowing on 2/3 of objects needed in Agvance"],
          planning: ["re-write ship-to API because of the GMK failures & SLA mismatch, which means customer API too, which adds other problems"],
        },
        "Brian": {
          preview: ["new Account App (credit app), reality checks on monday.com"],
          planning: ["discovery work for customer onboarding? multi-product?"],
        },
        "Reagan": {
          preview: ["brief comment on LDAP (joint effort w/ IT)"],
          planning: ["ERD & backup tool & presentation"],
        },
      },
    },
    "MARKETING":          { color: "#FF6B6B", goFirst: "Tony",             members: ["Jill", "Ashley", "Adam", "Christine", "Tony"] },
    "ENERGY":             { color: "#FF7A1A", goFirst: "Nicole",           members: ["Nicole", "Jessica", "Trina", "Heather", "Jeremy"] },
    "PROJECT MGMT":       { color: "#DFFF00", goFirst: "Mark Christensen", members: ["Jeremy Gray", "Mark Christensen", "Nate Katzer", "Jen Ohrt"] },
  };
  const CUSTOM_COLOR = "#C0C0C0";

  const COLOR_PALETTE = [
    "#ffb800", // gold
    "#38bdf8", // sky blue
    "#d946ef", // neon purple
    "#ff1493", // neon pink
    "#a3e635", // lime
    "#22d3ee", // cyan
    "#f97316", // orange
    "#facc15", // yellow
    "#fb7185", // rose
    "#a78bfa", // violet
  ];

  const PRESET_SECONDS = 5 * 60;
  const MAX_TOTAL_SECONDS = 30 * 60;
  const MAX_CUSTOM_PEOPLE = 10;
  const ABSENT_THRESHOLD = 10; // <10s elapsed = the person wasn't there
  const LEADERBOARD_KEY = "meeting-timer-leaderboard-v2";

  const app = document.getElementById("app");

  let state = {
    screen: "splash",
    team: null,            // team name string
    members: [],           // ordered (post-shuffle) names
    colors: {},            // name -> hex color (random per round)
    secondsPerPerson: PRESET_SECONDS,
    currentIndex: 0,
    remaining: 0,
    elapsed: 0,
    overtimeAdded: 0,
    paused: false,
    results: [],
    intervalId: null,
    flashTimeoutId: null,
    customDraft: "",       // remembered textarea content
    returnTo: null,        // screen to return to from leaderboard
    currentAllotted: 0,    // allotted seconds for the person currently up
    enabled: {},           // { name: bool } — toggle state on the start screen
    playOrder: [],         // shuffled, filtered-by-enabled order for the current round
  };

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // Shuffle, but make sure `blockedName` doesn't end up first.
  function shuffleAvoidingFirst(arr, blockedName) {
    const s = shuffle(arr);
    if (s.length > 1 && s[0] === blockedName) {
      const swap = 1 + Math.floor(Math.random() * (s.length - 1));
      [s[0], s[swap]] = [s[swap], s[0]];
    }
    return s;
  }

  // Shuffle, but make sure `firstName` ends up first (if they're in the list).
  function shuffleWithFirst(arr, firstName) {
    const s = shuffle(arr);
    const i = s.indexOf(firstName);
    if (i > 0) {
      [s[0], s[i]] = [s[i], s[0]];
    }
    return s;
  }

  // Custom-group constraint: original first can't go first, original last can't go last.
  function shuffleCustomConstrained(arr, firstName, lastName) {
    if (arr.length < 2) return shuffle(arr);
    for (let i = 0; i < 200; i++) {
      const s = shuffle(arr);
      if (s[0] !== firstName && s[s.length - 1] !== lastName) return s;
    }
    // Fallback: avoid first at minimum.
    return shuffleAvoidingFirst(arr, firstName);
  }

  function alphabetized(arr) {
    return arr.slice().sort((a, b) => a.localeCompare(b));
  }

  // ---------- Warning beeps (Web Audio) ----------
  let audioCtx = null;
  function getAudioContext() {
    if (!audioCtx) {
      try {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (AC) audioCtx = new AC();
      } catch {}
    }
    return audioCtx;
  }
  function playBeep(frequency, duration = 0.2, volume = 0.12) {
    const ctx = getAudioContext();
    if (!ctx) return;
    // Resume if suspended (some browsers park the context until interaction).
    if (ctx.state === "suspended") { try { ctx.resume(); } catch {} }
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = "sine";
    osc.frequency.value = frequency;
    osc.connect(gain);
    gain.connect(ctx.destination);
    // Gentle fade in / hold / fade out — no harsh clicks.
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(volume, now + 0.03);
    gain.gain.setValueAtTime(volume, now + duration - 0.08);
    gain.gain.linearRampToValueAtTime(0, now + duration);
    osc.start(now);
    osc.stop(now + duration + 0.02);
  }
  function playBeeps(frequency, count, spacingMs = 260) {
    for (let i = 0; i < count; i++) {
      setTimeout(() => playBeep(frequency), i * spacingMs);
    }
  }
  // Threshold (seconds remaining) -> pattern. Fires only when the person's
  // allotted time is greater than the threshold, so it never fires at start.
  function playWarningForThreshold(threshold) {
    if (threshold === 300) playBeeps(523, 1);        // 5 min left: 1 mid tone (C5)
    else if (threshold === 120) playBeeps(659, 2);   // 2 min left: 2 tones (E5)
    else if (threshold === 60)  playBeeps(784, 3);   // 1 min left: 3 tones (G5)
  }

  // ---------- Leaderboard persistence (localStorage) ----------
  function loadLeaderboard() {
    try {
      const raw = localStorage.getItem(LEADERBOARD_KEY);
      return raw ? JSON.parse(raw) : {};
    } catch { return {}; }
  }
  function persistLeaderboard(data) {
    try { localStorage.setItem(LEADERBOARD_KEY, JSON.stringify(data)); } catch {}
  }
  function recordRun(team, results) {
    if (!team || team === "CUSTOM") return; // custom groups don't accumulate
    const data = loadLeaderboard();
    const teamData = data[team] || {};
    results.forEach(r => {
      if (r.elapsed < ABSENT_THRESHOLD) return; // absent — don't pollute totals
      const entry = teamData[r.name] || { saved: 0, elapsed: 0, allotted: 0, runs: 0, lastSeen: null };
      entry.saved += (r.allotted - r.elapsed);
      entry.elapsed += r.elapsed;
      entry.allotted += r.allotted;
      entry.runs += 1;
      entry.lastSeen = new Date().toISOString();
      teamData[r.name] = entry;
    });
    data[team] = teamData;
    persistLeaderboard(data);
  }
  function clearLeaderboardForTeam(team) {
    const data = loadLeaderboard();
    delete data[team];
    persistLeaderboard(data);
  }

  function assignRandomColors(names) {
    const palette = shuffle(COLOR_PALETTE);
    const out = {};
    names.forEach((name, i) => { out[name] = palette[i % palette.length]; });
    return out;
  }

  // For custom groups: largest 30s-aligned slot per person such that total <= 30 min
  function customSecondsPerPerson(n) {
    if (n <= 0) return 0;
    return Math.floor(MAX_TOTAL_SECONDS / n / 30) * 30;
  }

  function formatTime(totalSeconds) {
    const sign = totalSeconds < 0 ? "-" : "";
    const s = Math.abs(totalSeconds);
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return `${sign}${m}:${sec.toString().padStart(2, "0")}`;
  }

  function formatElapsed(seconds) {
    const sign = seconds < 0 ? "-" : "";
    const s = Math.abs(seconds);
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return `${sign}${m}:${sec.toString().padStart(2, "0")}`;
  }

  function clearTimers() {
    if (state.intervalId) { clearInterval(state.intervalId); state.intervalId = null; }
    if (state.flashTimeoutId) { clearTimeout(state.flashTimeoutId); state.flashTimeoutId = null; }
  }

  function render() {
    clearTimers();
    app.innerHTML = "";
    document.body.classList.toggle("light", state.screen === "agenda");
    if (state.screen === "splash") renderSplash();
    else if (state.screen === "configure") renderConfigure();
    else if (state.screen === "start") renderStart();
    else if (state.screen === "agenda") renderAgenda();
    else if (state.screen === "next") renderNext();
    else if (state.screen === "flash") renderFlash();
    else if (state.screen === "timer") renderTimer();
    else if (state.screen === "summary") renderSummary();
    else if (state.screen === "leaderboard") renderLeaderboard();
  }

  // ---------- Splash ----------
  function renderSplash() {
    const teamButtons = Object.entries(TEAMS).map(([name, info]) => {
      const perPerson = info.perPersonSeconds || PRESET_SECONDS;
      return `
      <button class="team-btn" data-team="${name}" style="--team-color:${info.color}">
        <span class="team-name">${name}</span>
        <span class="team-members">${info.members.length} people · ${formatTime(perPerson)} each</span>
      </button>
    `;
    }).join("");

    const el = document.createElement("div");
    el.className = "splash-screen";
    el.innerHTML = `
      <h1>Meeting Timer</h1>
      <p class="subtitle">Choose your team</p>
      <div class="team-grid">
        ${teamButtons}
        <button class="team-btn custom-btn" data-team="__custom__" style="--team-color:${CUSTOM_COLOR}">
          <span class="team-name">+ Custom Group</span>
          <span class="team-members">Up to 10 · scales to fit 30:00</span>
        </button>
      </div>
    `;
    app.appendChild(el);

    el.querySelectorAll(".team-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const team = btn.dataset.team;
        if (team === "__custom__") {
          state.screen = "configure";
          render();
        } else {
          selectPresetTeam(team);
        }
      });
    });
  }

  function teamColor() {
    return state.team && TEAMS[state.team] ? TEAMS[state.team].color : CUSTOM_COLOR;
  }

  function selectPresetTeam(teamName) {
    state.team = teamName;
    state.members = TEAMS[teamName].members.slice();
    state.secondsPerPerson = TEAMS[teamName].perPersonSeconds || PRESET_SECONDS;
    initToggleStateAndColors();
    state.screen = "start";
    render();
  }

  // Assign random colors to all members and set default enabled state.
  // Flex-last member (e.g. Jen) starts off; everyone else starts on.
  function initToggleStateAndColors() {
    state.colors = assignRandomColors(state.members);
    const flexName = state.team !== "CUSTOM" ? TEAMS[state.team]?.flexLast?.name : null;
    state.enabled = {};
    state.members.forEach(name => {
      state.enabled[name] = (name !== flexName);
    });
  }

  // ---------- Configure (custom) ----------
  function renderConfigure() {
    const el = document.createElement("div");
    el.className = "config-screen";
    el.innerHTML = `
      <h1>Custom</h1>
      <p class="subtitle">Up to ${MAX_CUSTOM_PEOPLE} people · scales to fit 30:00</p>
      <textarea id="nameInput" placeholder="One name per line..."></textarea>
      <div class="config-stats" id="configStats">&nbsp;</div>
      <div class="btn-row">
        <button class="btn-back" id="backBtn">Back</button>
        <button class="btn-done" id="continueBtn" disabled>Continue</button>
      </div>
    `;
    app.appendChild(el);

    const input = document.getElementById("nameInput");
    const stats = document.getElementById("configStats");
    const continueBtn = document.getElementById("continueBtn");
    const backBtn = document.getElementById("backBtn");

    input.value = state.customDraft || "";

    function parseNames() {
      return input.value
        .split(/[\r\n,]+/)
        .map(s => s.trim())
        .filter(Boolean);
    }

    function updateStats() {
      const names = parseNames();
      const n = names.length;
      state.customDraft = input.value;

      if (n === 0) {
        stats.textContent = "Enter at least 1 name";
        stats.classList.remove("error");
        continueBtn.disabled = true;
        return;
      }
      if (n > MAX_CUSTOM_PEOPLE) {
        stats.textContent = `Too many — max ${MAX_CUSTOM_PEOPLE}`;
        stats.classList.add("error");
        continueBtn.disabled = true;
        return;
      }
      const perPerson = customSecondsPerPerson(n);
      const total = perPerson * n;
      stats.textContent = `${n} ${n === 1 ? "person" : "people"} × ${formatTime(perPerson)} each = ${formatTime(total)} total`;
      stats.classList.remove("error");
      continueBtn.disabled = false;
    }

    input.addEventListener("input", updateStats);
    updateStats();
    setTimeout(() => input.focus(), 50);

    backBtn.addEventListener("click", () => {
      state.screen = "splash";
      render();
    });

    continueBtn.addEventListener("click", () => {
      const names = parseNames();
      if (names.length === 0 || names.length > MAX_CUSTOM_PEOPLE) return;
      state.team = "CUSTOM";
      state.members = names;
      state.secondsPerPerson = customSecondsPerPerson(names.length);
      initToggleStateAndColors();
      state.screen = "start";
      render();
    });
  }

  function totalLabelForTeam() {
    const flex = state.team !== "CUSTOM" ? TEAMS[state.team]?.flexLast : null;
    const enabledMembers = state.members.filter(n => state.enabled[n] !== false);
    const flexOn = flex && enabledMembers.includes(flex.name);
    const regularCount = flexOn ? enabledMembers.length - 1 : enabledMembers.length;
    const base = Math.max(0, regularCount) * state.secondsPerPerson;
    return flexOn ? `up to ${formatTime(base)} total` : `${formatTime(base)} total`;
  }

  // ---------- Start ----------
  function renderStart() {
    const totalMin = totalLabelForTeam();
    const c = teamColor();
    const isPreset = state.team && state.team !== "CUSTOM";

    const toggles = alphabetized(state.members).map(name => {
      const on = state.enabled[name] !== false;
      const color = state.colors[name] || "#fff";
      return `<button class="name-toggle ${on ? "" : "off"}" data-name="${name}" style="--name-color:${color}">${name}</button>`;
    }).join("");

    const enabledCount = state.members.filter(n => state.enabled[n] !== false).length;

    const el = document.createElement("div");
    el.className = "start-screen";
    el.innerHTML = `
      <h1 style="color:${c}; text-shadow: 0 0 30px ${c};">${state.team}</h1>
      <p>${formatTime(state.secondsPerPerson)} per person · ${totalMin}</p>
      <div class="names-toggle">${toggles}</div>
      <div class="btn-row">
        <button class="btn-back" id="backBtn">Back</button>
        <button class="ghost">Pause</button>
        <button class="btn-done" id="startBtn"${enabledCount === 0 ? " disabled" : ""}>Start</button>
      </div>
      ${isPreset ? `<button class="leaderboard-link" id="leaderboardLink">🏆 ${state.team} Leaderboard</button>` : ""}
    `;
    app.appendChild(el);

    el.querySelectorAll(".name-toggle").forEach(btn => {
      btn.addEventListener("click", () => {
        const name = btn.dataset.name;
        state.enabled[name] = !(state.enabled[name] !== false);
        render();
      });
    });

    document.getElementById("startBtn").addEventListener("click", startRound);
    document.getElementById("backBtn").addEventListener("click", () => {
      state.screen = "splash";
      render();
    });
    if (isPreset) {
      document.getElementById("leaderboardLink").addEventListener("click", () => {
        state.returnTo = "start";
        state.screen = "leaderboard";
        render();
      });
    }
  }

  // Some teams have additional ordering preferences applied after shuffling.
  function applyTeamPreferences(team, order) {
    if (team === "ELEVATE") {
      const i = order.indexOf("Reagan");
      if (i !== -1 && i !== 3 && order.length > 3) {
        [order[i], order[3]] = [order[3], order[i]];
      }
    }
    const flex = TEAMS[team]?.flexLast;
    if (flex) {
      const i = order.indexOf(flex.name);
      const lastIdx = order.length - 1;
      if (i !== -1 && i !== lastIdx) {
        [order[i], order[lastIdx]] = [order[lastIdx], order[i]];
      }
    }
    return order;
  }

  function startRound() {
    const active = state.members.filter(n => state.enabled[n] !== false);
    if (active.length === 0) return;

    let order;
    if (state.team === "CUSTOM") {
      // Constrain by the typed input order, but only for those who are still enabled.
      const typedActive = state.members.filter(n => active.includes(n));
      const first = typedActive[0];
      const last = typedActive[typedActive.length - 1];
      order = shuffleCustomConstrained(active, first, last);
    } else if (TEAMS[state.team]?.fixedOrder) {
      // Preserve the roster order exactly, skipping anyone toggled off.
      order = state.members.filter(n => active.includes(n));
    } else {
      const first = TEAMS[state.team]?.goFirst;
      order = first ? shuffleWithFirst(active, first) : shuffle(active);
      order = applyTeamPreferences(state.team, order);
    }
    state.playOrder = order;
    state.currentIndex = 0;
    state.results = [];
    if (TEAMS[state.team]?.agenda) {
      state.screen = "agenda";
      render();
    } else {
      beginPerson();
    }
  }

  // ---------- Agenda (pre-round interstitial for teams with an agenda) ----------
  function renderAgenda() {
    const teamCfg = TEAMS[state.team] || {};
    const agenda = teamCfg.agenda || {};
    const c = teamColor();

    const cards = state.playOrder.map(name => {
      const entry = agenda[name] || {};
      const color = state.colors[name] || "#fff";
      const preview = (entry.preview || []).map(x => `<li>${x}</li>`).join("");
      const planning = (entry.planning || []).map(x => `<li>${x}</li>`).join("");
      return `
        <div class="agenda-card" style="--card-color:${color}">
          <div class="agenda-name">${name}</div>
          ${preview ? `<div class="agenda-section-label">Preview</div><ul class="agenda-items">${preview}</ul>` : ""}
          ${planning ? `<div class="agenda-section-label">Planning</div><ul class="agenda-items">${planning}</ul>` : ""}
        </div>
      `;
    }).join("");

    const el = document.createElement("div");
    el.className = "agenda-screen";
    el.innerHTML = `
      <h1 style="color:${c}; text-shadow: 0 0 30px ${c};">${teamCfg.agendaTitle || "Agenda"}</h1>
      ${cards}
      <div class="btn-row">
        <button class="btn-back" id="backBtn">Back</button>
        <button class="ghost">Pause</button>
        <button class="btn-done" id="beginBtn">Begin</button>
      </div>
    `;
    app.appendChild(el);

    document.getElementById("beginBtn").addEventListener("click", () => beginPerson());
    document.getElementById("backBtn").addEventListener("click", () => {
      state.screen = "start";
      render();
    });
  }

  function beginPerson() {
    const name = state.playOrder[state.currentIndex];
    const flex = TEAMS[state.team]?.flexLast;
    const isFlex = flex
      && state.currentIndex === state.playOrder.length - 1
      && name === flex.name;

    let allotted = state.secondsPerPerson;
    if (isFlex) {
      // Jen-style: get the team's saved time, capped at maxSeconds (and never negative).
      const savedSoFar = state.results.reduce((sum, r) => sum + (r.allotted - r.elapsed), 0);
      allotted = Math.max(0, Math.min(flex.maxSeconds, savedSoFar));
    }

    state.currentAllotted = allotted;
    state.remaining = allotted;
    state.elapsed = 0;
    state.overtimeAdded = 0;
    state.paused = false;
    state.screen = "flash";
    render();
    state.flashTimeoutId = setTimeout(() => {
      state.screen = "timer";
      render();
    }, 2500);
  }

  // ---------- Next ----------
  function renderNext() {
    const totalMin = totalLabelForTeam();
    const c = teamColor();
    const isPreset = state.team && state.team !== "CUSTOM";
    const el = document.createElement("div");
    el.className = "start-screen";
    el.innerHTML = `
      <h1 style="color:${c}; text-shadow: 0 0 30px ${c};">${state.team}</h1>
      <p>${formatTime(state.secondsPerPerson)} per person · ${totalMin}</p>
      <div class="names-preview">${alphabetized(state.playOrder).join(" · ")}</div>
      <div class="btn-row">
        <button class="ghost">+1 Minute</button>
        <button class="ghost">Pause</button>
        <button class="btn-done" id="nextBtn">Next</button>
      </div>
      ${isPreset ? `<button class="leaderboard-link" id="leaderboardLink">🏆 ${state.team} Leaderboard</button>` : ""}
    `;
    app.appendChild(el);
    document.getElementById("nextBtn").addEventListener("click", beginPerson);
    if (isPreset) {
      document.getElementById("leaderboardLink").addEventListener("click", () => {
        state.returnTo = "next";
        state.screen = "leaderboard";
        render();
      });
    }
  }

  // ---------- Flash ----------
  function renderFlash() {
    const name = state.playOrder[state.currentIndex];
    const color = state.colors[name] || "#fff";
    const el = document.createElement("div");
    el.className = "flash-screen";
    el.innerHTML = `<div class="flash-name" style="--name-chars:${name.length}; color:${color}">${name}</div>`;
    app.appendChild(el);
  }

  // ---------- Timer ----------
  function renderTimer() {
    const name = state.playOrder[state.currentIndex];
    const color = state.colors[name] || "#fff";
    const isOvertime = state.remaining < 0;

    const el = document.createElement("div");
    el.className = "timer-screen";
    el.innerHTML = `
      <div class="timer-name" style="--name-chars:${name.length}; color:${color}">${name}</div>
      <div class="timer-clock ${isOvertime ? "overtime" : ""}">${formatTime(state.remaining)}</div>
      <div class="timer-meta">Person ${state.currentIndex + 1} of ${state.playOrder.length}${state.overtimeAdded ? ` · +${state.overtimeAdded}:00 overtime` : ""}</div>
      ${state.paused ? `<div class="paused-banner">● Paused for Discussion</div>` : ""}
      <div class="btn-row">
        <button class="btn-over" id="overBtn">+1 Minute</button>
        <button class="btn-pause" id="pauseBtn">${state.paused ? "Resume" : "Pause"}</button>
        <button class="btn-done" id="doneBtn">Done</button>
      </div>
    `;
    app.appendChild(el);

    document.getElementById("doneBtn").addEventListener("click", finishPerson);
    document.getElementById("overBtn").addEventListener("click", () => {
      state.remaining += 60;
      state.overtimeAdded += 1;
      render();
    });
    document.getElementById("pauseBtn").addEventListener("click", () => {
      state.paused = !state.paused;
      render();
    });

    if (!state.paused) {
      state.intervalId = setInterval(() => {
        state.remaining -= 1;
        state.elapsed += 1;
        // Warning beeps: fire only when the person's allotted time exceeded
        // this threshold, so short slots never trigger the 5-min warning etc.
        [300, 120, 60].forEach(t => {
          if (state.remaining === t && state.currentAllotted > t) {
            playWarningForThreshold(t);
          }
        });
        const clockEl = app.querySelector(".timer-clock");
        const metaEl = app.querySelector(".timer-meta");
        if (clockEl) {
          clockEl.textContent = formatTime(state.remaining);
          if (state.remaining < 0) clockEl.classList.add("overtime");
        }
        if (metaEl) {
          metaEl.textContent = `Person ${state.currentIndex + 1} of ${state.playOrder.length}${state.overtimeAdded ? ` · +${state.overtimeAdded}:00 overtime` : ""}`;
        }
      }, 1000);
    }
  }

  function finishPerson() {
    const name = state.playOrder[state.currentIndex];
    state.results.push({
      name,
      color: state.colors[name] || "#fff",
      elapsed: state.elapsed,
      allotted: state.currentAllotted,
      overtimeAdded: state.overtimeAdded,
    });

    state.currentIndex += 1;
    if (state.currentIndex >= state.playOrder.length) {
      recordRun(state.team, state.results);
      state.screen = "summary";
    } else {
      state.screen = "next";
    }
    render();
  }

  // ---------- Summary ----------
  function renderSummary() {
    const present = state.results.filter(r => r.elapsed >= ABSENT_THRESHOLD);
    const absent = state.results.filter(r => r.elapsed < ABSENT_THRESHOLD);

    const total = present.reduce((sum, r) => sum + r.elapsed, 0);
    const totalAllotted = present.reduce((sum, r) => sum + r.allotted, 0);
    const totalSaved = totalAllotted - total;

    // Rank only people who were actually present
    const ranked = present
      .map(r => ({ ...r, saved: r.allotted - r.elapsed }))
      .sort((a, b) => b.saved - a.saved);

    const winnerName = ranked[0]?.name;

    const presentRows = ranked.map(r => {
      const isWinner = r.name === winnerName;
      let cls = "";
      let label = "";
      if (r.saved > 0) { cls = "under"; label = ` (-${formatElapsed(r.saved)})`; }
      else if (r.saved < 0) { cls = "over"; label = ` (+${formatElapsed(-r.saved)})`; }
      const rocket = isWinner ? `<span class="rocket">🚀</span>` : "";
      return `
        <li class="summary-row${isWinner ? " winner" : ""}">
          <span class="name" style="color:${r.color}">${rocket}${r.name}</span>
          <span class="time ${cls}">${formatElapsed(r.elapsed)}${label}</span>
        </li>
      `;
    }).join("");

    const absentRows = absent.map(r => `
      <li class="summary-row absent">
        <span class="name" style="color:${r.color}">${r.name}</span>
        <span class="time">Absent</span>
      </li>
    `).join("");

    const rows = presentRows + absentRows;

    const totalCls = totalSaved > 0 ? "under" : (totalSaved < 0 ? "over" : "");
    const totalLabel = totalSaved > 0
      ? ` (-${formatElapsed(totalSaved)})`
      : (totalSaved < 0 ? ` (+${formatElapsed(-totalSaved)})` : "");

    const c = teamColor();
    const el = document.createElement("div");
    el.className = "summary-screen";
    el.innerHTML = `
      <h1 style="color:${c}; text-shadow: 0 0 30px ${c};">${state.team} · Done</h1>
      <ul class="summary-list">
        ${rows}
        <li class="summary-row total-row">
          <span class="name">Total</span>
          <span class="time ${totalCls}">${formatElapsed(total)}${totalLabel}</span>
        </li>
      </ul>
      <div class="btn-row">
        <button class="btn-done" id="againBtn">Run Again</button>
      </div>
    `;
    app.appendChild(el);
    document.getElementById("againBtn").addEventListener("click", () => {
      state.screen = "splash";
      state.team = null;
      state.members = [];
      state.colors = {};
      state.results = [];
      state.enabled = {};
      state.playOrder = [];
      render();
    });
  }

  // ---------- Leaderboard ----------
  function renderLeaderboard() {
    const team = state.team;
    const c = teamColor();
    const allData = loadLeaderboard();
    const teamData = allData[team] || {};
    const entries = Object.entries(teamData)
      .map(([name, stats]) => ({ name, ...stats }))
      .sort((a, b) => b.saved - a.saved);

    const rankIcon = i => i === 0 ? "🚀" : i === 1 ? "🥈" : i === 2 ? "🥉" : `#${i + 1}`;

    let body;
    if (entries.length === 0) {
      body = `<div class="empty-leaderboard">No data yet — finish a round to start tracking</div>`;
    } else {
      const rows = entries.map((e, i) => {
        const cls = i === 0 ? "top1" : i === 1 ? "top2" : i === 2 ? "top3" : "";
        const savedCls = e.saved > 0 ? "under" : (e.saved < 0 ? "over" : "");
        const sign = e.saved > 0 ? "-" : (e.saved < 0 ? "+" : "");
        const savedStr = `${sign}${formatElapsed(Math.abs(e.saved))}`;
        return `
          <li class="leaderboard-row ${cls}">
            <span class="rank">${rankIcon(i)}</span>
            <span class="name">${e.name}</span>
            <span class="runs">${e.runs} ${e.runs === 1 ? "run" : "runs"}</span>
            <span class="saved ${savedCls}">${savedStr}</span>
          </li>
        `;
      }).join("");
      body = `<ul class="leaderboard-list">${rows}</ul>`;
    }

    const el = document.createElement("div");
    el.className = "leaderboard-screen";
    el.innerHTML = `
      <h1 style="color:${c}; text-shadow: 0 0 30px ${c};">🏆 ${team}</h1>
      <p class="subtitle">Total time saved across all rounds · this device only</p>
      ${body}
      <div class="btn-row">
        <button class="btn-back" id="backBtn">Back</button>
        ${entries.length ? `<button class="btn-over" id="resetBtn">Reset</button>` : ""}
      </div>
    `;
    app.appendChild(el);

    document.getElementById("backBtn").addEventListener("click", () => {
      state.screen = state.returnTo || "start";
      state.returnTo = null;
      render();
    });
    const resetBtn = document.getElementById("resetBtn");
    if (resetBtn) {
      resetBtn.addEventListener("click", () => {
        if (confirm(`Clear the ${team} leaderboard? This cannot be undone.`)) {
          clearLeaderboardForTeam(team);
          render();
        }
      });
    }
  }

  render();
})();
</script>
</body>
</html>
